name: ci
on:
  push:
  pull_request:

# wpsite is a macOS-only tool (Homebrew + BSD userland + /System fonts + Docker
# Desktop). Test on macOS so CI matches the only supported platform — running on
# Linux produced false failures (GNU-vs-BSD date/ImageMagick, no /System fonts so
# _placeholder_font returned non-zero) and used an older shellcheck that warns on
# patterns newer versions accept.

jobs:
  shellcheck:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install shellcheck
        run: brew install shellcheck
      - name: Run shellcheck
        run: shellcheck -x bin/wpsite lib/*.sh install.sh

  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        # mikefarah yq (brew's `yq`), ImageMagick + ffmpeg for placeholders, bats runner.
        run: brew install imagemagick ffmpeg yq bats-core
      - name: Run tests
        run: bats test/
